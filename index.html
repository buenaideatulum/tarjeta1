<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Califica tu experiencia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #fbbc04;
      --bg: #fff;
      --text: #222;
      --muted: #888;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
      text-align: center;
    }
    p {
      font-size: 1rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
    }
    .stars {
      display: flex;
      justify-content: center;
      gap: 1rem;
      font-size: 2.5rem;
    }
    .star {
      cursor: pointer;
      transition: transform 0.2s ease, color 0.2s ease;
      color: #ccc;
    }
    .star.selected {
      color: var(--primary);
    }
    .star:hover,
    .star:focus {
      transform: scale(1.2);
    }
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 400px) {
      .stars {
        font-size: 2rem;
        gap: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <h1>¿Cómo fue tu experiencia?</h1>
  <p>Califícanos tocando las estrellas</p>
  <div class="stars">
    <span class="star" onclick="rate(1)">★</span>
    <span class="star" onclick="rate(2)">★</span>
    <span class="star" onclick="rate(3)">★</span>
    <span class="star" onclick="rate(4)">★</span>
    <span class="star" onclick="rate(5)">★</span>
  </div>
  <footer>
    Tu opinión nos ayuda a mejorar 💛
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCYQKX6CKcWbC6B2cAA7CCpLrSFEAlE4jw",
      authDomain: "tarjeta1-2a219.firebaseapp.com",
      projectId: "tarjeta1-2a219",
      storageBucket: "tarjeta1-2a219.firebasestorage.app",
      messagingSenderId: "38614162032",
      appId: "1:38614162032:web:ac38f85cd78be5c322f2b5",
      measurementId: "G-5G3P5LDGK6",
      databaseURL: "https://tarjeta1-2a219-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function getDeviceName() {
      const ua = navigator.userAgent;
      if (/iPhone/i.test(ua)) return "iPhone";
      if (/iPad/i.test(ua)) return "iPad";
      if (/Android/i.test(ua)) return "Android";
      if (/Windows/i.test(ua)) return "Windows PC";
      if (/Macintosh/i.test(ua)) return "Mac";
      return "Otro dispositivo";
    }

    const stars = document.querySelectorAll('.star');

    window.rate = function(starIndex) {
      // Selección visual
      stars.forEach((star, index) => {
        star.classList.toggle('selected', index < starIndex);
      });

      // Definir URL de destino
      const url = starIndex <= 3
        ? "https://docs.google.com/forms/d/e/1FAIpQLSdLBTxbxK1YjYwKOSSaAVrtjqjehR4HLn9NvvKdyHzPKVlznA/viewform?usp=header"
        : "https://g.page/r/CfMoIh9zqu4UEBM/review";

      // Guardar en Firebase (sin bloquear la redirección)
      push(ref(db, "calificaciones"), {
        estrellas: starIndex,
        dispositivo: getDeviceName(),
        fecha: new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }),
        mes: new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City', month: 'long', year: 'numeric' })
      }).catch(e => console.error("Error guardando en Firebase:", e));

      // Redirigir siempre después de 600ms
      setTimeout(() => {
        window.location.href = url;
      }, 600);
    }
  </script>
</body>
</html>
